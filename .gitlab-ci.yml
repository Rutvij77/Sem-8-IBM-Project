stages:
  - build-and-validate
  - deploy

# Job 1: Check Frontend
frontend_validation:
  stage: build-and-validate
  image: node:18
  script:
    - echo "Validating Frontend React/Vite app..."
    - cd frontend
    # Install all dependencies precisely
    - npm install
    # Execute the build command to ensure no UI compilation errors exist
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1h

# Job 2: Check Backend
backend_validation:
  stage: build-and-validate
  image: python:3.10
  script:
    - echo "Validating Backend Python/Flask app..."
    - cd backend
    # Install required dependencies
    - pip install -r requirements.txt
    # Run a syntax check compiler across all python files
    - python -m compileall .

# Job 3: Deploy Frontend to Vercel
deploy_frontend:
  stage: deploy
  image: node:18
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - echo "Deploying Frontend to Vercel..."
    - cd frontend
    - npm install -g vercel
    # Pull Vercel Environment Variables
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    # Build Project Artifacts
    - vercel build --prod --token=$VERCEL_TOKEN
    # Deploy to Vercel
    - vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
